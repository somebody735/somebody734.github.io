<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #667eea;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .error-code span {
            display: inline-block;
        }

        .zero-button {
            background: none;
            border: none;
            color: #667eea;
            font-size: 120px;
            font-weight: bold;
            cursor: pointer;
            padding: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s ease;
            font-family: inherit;
        }

        .zero-button:hover {
            transform: scale(1.05);
        }

        .zero-button:active {
            transform: scale(0.95);
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">
            <span>4</span><button class="zero-button" onclick="goHome()">0</button><span>4</span>
        </div>
        <h1>Page Not Found</h1>
        <p>This website has been taken down or is not available</p>
        <button onclick="goGithub()">Return to Github</button>
    </div>

    <script>
        function goGithub() {
            window.location.href = 'https://github.com';
        }
    </script>

    <script>
        // Function to redirect home
        function goHome() {
            window.location.href = 'https://238g348kmnjhgvbnjhuyt6gyhb.github.io/0/g/index.html'; // Change '/' to your desired URL
        }
    </script>
</body>
</html>
